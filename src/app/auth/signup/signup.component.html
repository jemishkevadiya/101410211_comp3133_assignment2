<div class="container">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>Sign Up</mat-card-title>
        <mat-card-subtitle>Create a new account</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" required />
            <mat-icon matSuffix>person</mat-icon>
            <mat-error *ngIf="signupForm.get('username')?.hasError('required')">Username is required</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" required />
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="signupForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="signupForm.get('email')?.hasError('email')">Invalid email</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" required />
            <mat-icon matSuffix>lock</mat-icon>
            <mat-error *ngIf="signupForm.get('password')?.hasError('required')">Password is required</mat-error>
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="signupForm.invalid">Sign Up</button>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <a routerLink="/login" class="link">Already have an account? Login</a>
      </mat-card-actions>
    </mat-card>
  </div>
