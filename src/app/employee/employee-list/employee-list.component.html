<div class="container">
    <mat-card class="employee-card">
      <mat-card-header>
        <mat-card-title>Employee List</mat-card-title>
        <mat-card-subtitle>Manage your employees</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="actions">
          <button mat-raised-button color="primary" routerLink="/employees/add">
            <mat-icon>add</mat-icon> Add Employee
          </button>
        </div>
        <div class="search-form">
          <mat-form-field appearance="outline">
            <mat-label>Search by Designation</mat-label>
            <input matInput [(ngModel)]="searchDesignation" (input)="searchEmployees()" placeholder="e.g., Developer" />
            <mat-icon matSuffix>search</mat-icon>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Search by Department</mat-label>
            <input matInput [(ngModel)]="searchDepartment" (input)="searchEmployees()" placeholder="e.g., IT" />
            <mat-icon matSuffix>search</mat-icon>
          </mat-form-field>
        </div>
        <mat-table [dataSource]="employees" class="mat-elevation-z8">
          <ng-container matColumnDef="first_name">
            <mat-header-cell *matHeaderCellDef>First Name</mat-header-cell>
            <mat-cell *matCellDef="let employee">{{ employee.first_name }}</mat-cell>
          </ng-container>
          <ng-container matColumnDef="last_name">
            <mat-header-cell *matHeaderCellDef>Last Name</mat-header-cell>
            <mat-cell *matCellDef="let employee">{{ employee.last_name }}</mat-cell>
          </ng-container>
          <ng-container matColumnDef="email">
            <mat-header-cell *matHeaderCellDef>Email</mat-header-cell>
            <mat-cell *matCellDef="let employee">{{ employee.email }}</mat-cell>
          </ng-container>
          <ng-container matColumnDef="designation">
            <mat-header-cell *matHeaderCellDef>Designation</mat-header-cell>
            <mat-cell *matCellDef="let employee">{{ employee.designation }}</mat-cell>
          </ng-container>
          <ng-container matColumnDef="department">
            <mat-header-cell *matHeaderCellDef>Department</mat-header-cell>
            <mat-cell *matCellDef="let employee">{{ employee.department }}</mat-cell>
          </ng-container>
          <ng-container matColumnDef="actions">
            <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
            <mat-cell *matCellDef="let employee">
              <button mat-icon-button color="primary" (click)="viewDetails(employee.id)">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button color="accent" (click)="editEmployee(employee.id)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteEmployee(employee.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </mat-cell>
          </ng-container>
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
        </mat-table>
      </mat-card-content>
    </mat-card>
  </div>
